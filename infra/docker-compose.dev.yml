name: anotator-dev

services:
  frontend:
    image: node:22-bookworm
    working_dir: /app
    command: >
      sh -lc "corepack prepare pnpm@9.15.3 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      NEXT_PUBLIC_ENABLE_MOCK_FALLBACK: ${NEXT_PUBLIC_ENABLE_MOCK_FALLBACK:-false}
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://anotator:anotator@postgres:5432/anotator
      REDIS_URL: redis://redis:6379/0
      CVAT_BASE_URL: http://host.docker.internal:8080
      CVAT_ACCESS_TOKEN: ${CVAT_ACCESS_TOKEN:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: anotator-artifacts
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      CORS_ORIGINS: http://localhost:3000
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://anotator:anotator@postgres:5432/anotator
      REDIS_URL: redis://redis:6379/0
      CVAT_BASE_URL: http://host.docker.internal:8080
      CVAT_ACCESS_TOKEN: ${CVAT_ACCESS_TOKEN:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: anotator-artifacts
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      AUTO_CREATE_TABLES: "true"
    volumes:
      - ../backend:/app/backend
      - worker_artifacts:/artifacts
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anotator
      POSTGRES_USER: anotator
      POSTGRES_PASSWORD: anotator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anotator -d anotator"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/anotator-artifacts;
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://anotator-artifacts/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - minio

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  minio_data:
  mlflow_data:
  worker_artifacts:
