name: anotator-dev

services:
  frontend:
    image: node:22-bookworm
    working_dir: /app
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.15.3 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8020/api/v1
      NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ..:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app/backend
    command: sh -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://anotator:anotator@postgres:5432/anotator
      REDIS_URL: redis://redis:6379/0
      CVAT_BASE_URL: http://host.docker.internal:8080
      CVAT_ACCESS_TOKEN: ${CVAT_ACCESS_TOKEN:-}
      CVAT_AUTH_SCHEME: ${CVAT_AUTH_SCHEME:-Token}
      CVAT_HOST_HEADER: ${CVAT_HOST_HEADER:-localhost}
      ANNOTATION_FRAME_MAX_SIDE: ${ANNOTATION_FRAME_MAX_SIDE:-1920}
      ANNOTATION_FRAME_JPEG_QUALITY: ${ANNOTATION_FRAME_JPEG_QUALITY:-84}
      ANNOTATION_FRAME_SOURCE_QUALITY: ${ANNOTATION_FRAME_SOURCE_QUALITY:-compressed}
      ANNOTATION_FRAME_CACHE_DIR: ${ANNOTATION_FRAME_CACHE_DIR:-/tmp/anotator-frame-cache}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@cvat.plus}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Administrador}
      JOB_STALE_AFTER_SECONDS: ${JOB_STALE_AFTER_SECONDS:-900}
      TRAINING_CPU_MAX_WORKERS: ${TRAINING_CPU_MAX_WORKERS:-2}
      TRAINING_CPU_MAX_THREADS: ${TRAINING_CPU_MAX_THREADS:-4}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: anotator-artifacts
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      CORS_ORIGINS: http://localhost:3000
      AUTO_CREATE_TABLES: "false"
      ANOTATOR_DOCKER_GPU_ENABLED: ${ANOTATOR_DOCKER_GPU_ENABLED:-false}
      HOST_NVIDIA_GPUS: ${HOST_NVIDIA_GPUS:-}
    ports:
      - "${BACKEND_PORT:-8020}:8000"
    volumes:
      - ../backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app/backend
    command: sh -lc "alembic upgrade head && celery -A app.core.celery_app.celery_app worker --loglevel=INFO"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://anotator:anotator@postgres:5432/anotator
      REDIS_URL: redis://redis:6379/0
      CVAT_BASE_URL: http://host.docker.internal:8080
      CVAT_ACCESS_TOKEN: ${CVAT_ACCESS_TOKEN:-}
      CVAT_AUTH_SCHEME: ${CVAT_AUTH_SCHEME:-Token}
      CVAT_HOST_HEADER: ${CVAT_HOST_HEADER:-localhost}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@cvat.plus}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Administrador}
      JOB_STALE_AFTER_SECONDS: ${JOB_STALE_AFTER_SECONDS:-900}
      TRAINING_CPU_MAX_WORKERS: ${TRAINING_CPU_MAX_WORKERS:-2}
      TRAINING_CPU_MAX_THREADS: ${TRAINING_CPU_MAX_THREADS:-4}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: anotator-artifacts
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      AUTO_CREATE_TABLES: "false"
      ANOTATOR_DOCKER_GPU_ENABLED: ${ANOTATOR_DOCKER_GPU_ENABLED:-false}
      HOST_NVIDIA_GPUS: ${HOST_NVIDIA_GPUS:-}
    volumes:
      - ../backend:/app/backend
      - worker_artifacts:/artifacts
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anotator
      POSTGRES_USER: anotator
      POSTGRES_PASSWORD: anotator
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anotator -d anotator"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/anotator-artifacts;
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://anotator-artifacts/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - minio

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  minio_data:
  mlflow_data:
  worker_artifacts:
